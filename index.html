<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlitzPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #233450;
      --blue: #425A82;
      --light-blue: #BBD3FA;
      --yellow: #ECC02E;
      --white: #F5F7FB;
      --muted: #DCE7F8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(57, 88, 132, 0.58) 0%,
          rgba(57, 88, 132, 0.46) 32%,
          rgba(57, 88, 132, 0.18) 58%,
          rgba(35, 52, 80, 0.95) 82%,
          #233450 100%);
      color: var(--white);
      font-family: "Open Sans", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .hero {
      width: 100%;
      max-width: 980px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap {
      margin-bottom: 12px;
    }

    .actual-logo {
      width: min(420px, 70vw);
      max-height: 180px;
      height: auto;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }

    .tagline {
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.35;
    }

    .highlight {
      font-size: clamp(1.2rem, 2.5vw, 1.95rem);
      color: var(--yellow);
      font-style: italic;
      font-weight: 700;
      line-height: 1.35;
      margin-top: 2px;
    }

    .coming-soon {
      display: inline-block;
      margin-top: 26px;
      padding: 10px 18px;
      border: 1px solid rgba(187, 211, 250, 0.35);
      border-radius: 999px;
      color: var(--light-blue);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact {
      margin-top: 24px;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.9;
    }

    .contact a {
      color: var(--light-blue);
      text-decoration: none;
      font-weight: 700;
    }

    .contact a:hover,
    .contact a:focus-visible {
      color: var(--yellow);
    }

    @media (max-width: 640px) {
      body {
        padding: 20px;
      }

      .actual-logo {
        width: min(320px, 78vw);
        max-height: 140px;
      }

      .tagline,
      .highlight {
        font-size: 1.1rem;
      }

      .contact {
        font-size: 0.95rem;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="logo-wrap">
      <img src="[Blitzpay] Logo.png" alt="BlitzPay logo" class="actual-logo">
    </div>

    <p class="tagline">Transforming messy, fragmented payroll into a</p>
    <p class="highlight">centralized, trusted, automated service for SMEs</p>

    <div class="coming-soon">Coming Soon</div>

    <div class="contact">
      <p>LinkedIn: <a href="https://www.linkedin.com/company/blitzpaypayroll" target="_blank" rel="noopener noreferrer">linkedin.com/company/blitzpaypayroll</a></p>
      <p>Facebook: <a href="https://www.facebook.com/profile.php?id=61588697439462" target="_blank" rel="noopener noreferrer">facebook.com/blitzpay</a></p>
      <p>Contact us for early inquiries and partnerships.</p>
    </div>
  </main>
</body>
</html>
